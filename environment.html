<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Environment Checker — Free Room Audit | RestLab</title>
  <meta name="description" content="Free interactive sleep environment checklist. Check your bedroom temperature, noise, light, mattress age, and more. Get personalized product recommendations.">
  <meta property="og:title" content="Sleep Environment Checker — RestLab">
  <meta property="og:description" content="Check your bedroom setup across 6 key factors for better sleep.">
  <meta name="robots" content="index, follow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="bg-white/80 backdrop-blur-sm border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="index.html" class="font-bold text-lg tracking-tight">
        <span class="text-indigo-600">Rest</span><span class="text-gray-900">Lab</span>
      </a>
      <div class="flex gap-3 text-xs">
        <a href="calculator.html" class="text-gray-400 hover:text-gray-600">Calculator</a>
        <a href="assessment.html" class="text-gray-400 hover:text-gray-600">Assessment</a>
        <a href="environment.html" class="text-indigo-600 font-medium">Room Check</a>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-10">
    <div class="text-center mb-8">
      <div class="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-medium rounded-full mb-3">Room Audit</div>
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Sleep Environment Checker</h1>
      <p class="text-sm text-gray-500 mt-1">Evaluate your bedroom setup across 6 key areas.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5" id="checklist">
      <!-- Items rendered by JS -->
    </div>

    <button id="checkResultsBtn" class="mt-4 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition-colors shadow-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>
      See Your Results
    </button>
  </main>

  <!-- Results -->
  <div id="resultsSection" class="max-w-2xl mx-auto px-4 pb-12 hidden">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-1">Your Room Audit Results</h2>
      <p class="text-xs text-gray-400 mb-4"><span id="passCount">0</span>/6 factors optimized</p>
      <div id="resultsList" class="space-y-3"></div>
    </div>

    <!-- Affiliate Section -->
    <div id="productRecs" class="mt-4 space-y-3"></div>
  </div>

  <footer class="border-t border-gray-100 bg-gray-50 mt-12">
    <div class="max-w-3xl mx-auto px-4 py-8 text-center text-xs text-gray-400">
      <p>We participate in affiliate programs. Some links may earn us a commission.</p>
    </div>
  </footer>

  <script src="js/environment.js"></script>
</body>
</html>
